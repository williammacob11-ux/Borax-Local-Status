<!DOCTYPE html>
<html>
<head>
  <title>BORAX Local Status</title>

  <style>
    body {
      margin: 0;
      background: #001022;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      width: 420px;
      margin: 120px auto;
      border: 2px solid white;
      padding: 20px;
      background: rgba(0,0,0,0.4);
    }

    #time {
      font-size: 60px;
    }

    #date {
      font-size: 18px;
      opacity: 0.8;
    }

    #info {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-line;
      min-height: 80px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h3>BORAX LOCAL STATUS</h3>

    <div id="time">--:--</div>
    <div id="date">---</div>

    <div id="info">Starting broadcast...</div>
  </div>

<script>
let screens = [
  "AD: BORAX Laundry - Trusted since 1982",
  "LOCAL NOTICE: Stay hydrated today",
  "COMMUNITY: Round Rock parks open"
];

let i = 0;

function updateTime() {
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let ampm = h >= 12 ? "PM" : "AM";

  h = h % 12;
  if (h === 0) h = 12;
  if (m < 10) m = "0" + m;

  document.getElementById("time").innerText = `${h}:${m} ${ampm}`;
  document.getElementById("date").innerText = now.toDateString();
}

function rotate() {
  document.getElementById("info").innerText = screens[i];
  i = (i + 1) % screens.length;
}

// 🌤️ REAL WEATHER (Round Rock)
async function loadWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=30.5083&longitude=-97.6789&current=temperature_2m,weather_code&temperature_unit=fahrenheit");
    const data = await res.json();

    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;

    let condition = "";

    // 🌤️ Better weather mapping (Open-Meteo standard codes)
    if (code === 0) condition = "Clear";
    else if (code === 1 || code === 2) condition = "Mostly Sunny";
    else if (code === 3) condition = "Cloudy";
    else if (code >= 45 && code <= 48) condition = "Fog";
    else if (code >= 51 && code <= 55) condition = "Drizzle";
    else if (code >= 61 && code <= 65) condition = "Rain";
    else if (code >= 66 && code <= 67) condition = "Freezing Rain";
    else if (code >= 71 && code <= 77) condition = "Snow";
    else if (code >= 80 && code <= 82) condition = "Rain Showers";
    else if (code >= 95) condition = "Thunderstorms";
    else condition = "Unknown";

    // 🌡️ Make it realistic for Texas feel
    let vibe = "";
    if (temp >= 95) vibe = "Very Hot";
    else if (temp >= 85) vibe = "Hot";
    else if (temp >= 70) vibe = "Warm";
    else if (temp >= 50) vibe = "Cool";
    else vibe = "Cold";

    screens.push(`WEATHER:\n${temp}°F - ${condition}\nFeels like: ${vibe}`);
    
  } catch (e) {
    screens.push("WEATHER: Unable to load data");
  }
}

setInterval(updateTime, 1000);
setInterval(rotate, 5000);

updateTime();
rotate();
loadWeather();
</script>
</body>
</html>
