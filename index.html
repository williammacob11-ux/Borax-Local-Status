<!DOCTYPE html>
<html>
<head>
  <title>BORAX Local Status</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      transition: background 1s ease;
    }

    body.day {
      background: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover no-repeat;
    }

    body.night {
      background: #000;
    }

    .container {
      display: grid;
      gap: 15px;
      padding: 20px;
      height: 100vh;
      box-sizing: border-box;
    }

    body.day .container { grid-template-columns: 1fr 1fr 1fr; }
    body.night .container { grid-template-columns: 1fr 1fr; }

    .tile {
      background: rgba(0,0,0,0.6);
      border: 1px solid white;
      padding: 20px;
      backdrop-filter: blur(5px);
    }

    .timeBig { font-size: 48px; }

    canvas { background: transparent; }
  </style>
</head>

<body>

<div class="container">

  <!-- TIME -->
  <div class="tile">
    <h3>TIME</h3>
    <div class="timeBig" id="time">--:--</div>
    <div id="date">---</div>
    <canvas id="clock" width="140" height="140"></canvas>
  </div>

  <!-- WEATHER -->
  <div class="tile">
    <h3>ROUND ROCK WEATHER</h3>
    <div id="weather">Loading...</div>
  </div>

  <!-- NEWS -->
  <div class="tile" id="newsTile">
    <h3>AUSTIN NEWS</h3>
    <div id="news">Loading headlines...</div>
  </div>

</div>

<script>
const API_KEY = "69d758106d8333cb8e806b8d3bff6d15";

/* ---------------- TIME ---------------- */
function updateTime() {
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let s = now.getSeconds();
  const ampm = h >= 12 ? "PM" : "AM";

  h = h % 12 || 12;
  m = m < 10 ? "0" + m : m;
  s = s < 10 ? "0" + s : s;

  document.getElementById("time").innerText = `${h}:${m}:${s} ${ampm}`;
  document.getElementById("date").innerText = now.toDateString();
}

/* ---------------- ANALOG CLOCK ---------------- */
function drawClock() {
  const canvas = document.getElementById("clock");
  const ctx = canvas.getContext("2d");
  const now = new Date();

  const radius = 60;

  ctx.clearRect(0,0,140,140);

  ctx.save();
  ctx.translate(70,70);

  // outer circle
  ctx.beginPath();
  ctx.arc(0,0,radius,0,Math.PI*2);
  ctx.strokeStyle="white";
  ctx.lineWidth = 2;
  ctx.stroke();

  // tick marks
  for (let i=0;i<12;i++) {
    ctx.beginPath();
    ctx.rotate(Math.PI/6);
    ctx.moveTo(0,-radius);
    ctx.lineTo(0,-radius+10);
    ctx.stroke();
  }

  ctx.rotate(-Math.PI*2);

  // hour hand
  const hr = now.getHours()%12;
  ctx.save();
  ctx.rotate((Math.PI/6)*hr + (Math.PI/360)*now.getMinutes());
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(0,-30);
  ctx.lineWidth = 4;
  ctx.stroke();
  ctx.restore();

  // minute hand
  ctx.save();
  ctx.rotate((Math.PI/30)*now.getMinutes());
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(0,-45);
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();

  // second hand
  ctx.save();
  ctx.strokeStyle="red";
  ctx.rotate((Math.PI/30)*now.getSeconds());
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(0,-55);
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  ctx.restore();
}

/* ---------------- WEATHER ---------------- */
function getWeatherEmoji(main) {
  if (!main) return "🌡️";
  if (main.includes("Cloud")) return "☁️";
  if (main.includes("Rain")) return "🌧️";
  if (main.includes("Thunder")) return "⛈️";
  if (main.includes("Clear")) return "☀️";
  if (main.includes("Snow")) return "❄️";
  return "🌤️";
}

async function loadWeather() {
  try {
    // NOTE: switching to One Call style would give UV index properly
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=30.5083&lon=-97.6789&units=imperial&appid=${API_KEY}`
    );

    const data = await res.json();

    const emoji = getWeatherEmoji(data.weather[0].main);

    document.getElementById("weather").innerHTML = `
      ${emoji} <b>${Math.round(data.main.temp)}°F</b><br>
      ${data.weather[0].main}<br><br>

      Feels Like: ${Math.round(data.main.feels_like)}°F<br>
      Humidity: ${data.main.humidity}%<br>
      Wind: ${data.wind.speed} mph<br>
      Visibility: ${(data.visibility/1609).toFixed(1)} mi<br>
      Pressure: ${data.main.pressure} hPa<br>
    `;
  } catch {
    document.getElementById("weather").innerText = "Weather unavailable";
  }
}

/* ---------------- REAL NEWS (API) ---------------- */
async function loadNews() {
  try {
    // Replace THIS with a real NewsAPI key
    const res = await fetch(
      `https://newsapi.org/v2/top-headlines?country=us&apiKey=YOUR_NEWS_API_KEY`
    );

    const data = await res.json();

    document.getElementById("news").innerHTML =
      data.articles.slice(0,5).map(a => `• ${a.title}`).join("<br>");

  } catch {
    document.getElementById("news").innerHTML =
      "News unavailable (check API key)";
  }
}

/* ---------------- MODE ---------------- */
function setMode() {
  const hour = new Date().getHours();
  const isDay = hour >= 9 && hour < 22;

  document.body.className = isDay ? "day" : "night";

  document.getElementById("newsTile").style.display =
    isDay ? "block" : "none";
}

/* ---------------- LOOP ---------------- */
setInterval(updateTime, 1000);
setInterval(drawClock, 1000);

updateTime();
drawClock();
loadWeather();
loadNews();
setMode();
</script>

</body>
</html>
