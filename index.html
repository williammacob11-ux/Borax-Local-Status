<script>
let ads = [
  "AD: BORAX Laundry - Trusted since 1982",
  "LOCAL NOTICE: Stay hydrated today",
  "COMMUNITY: Visit Round Rock Park"
];

let adIndex = 0;

function updateTime() {
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let ampm = h >= 12 ? "PM" : "AM";

  h = h % 12;
  if (h === 0) h = 12;
  if (m < 10) m = "0" + m;

  document.getElementById("time").innerText = `${h}:${m} ${ampm}`;
  document.getElementById("date").innerText = now.toDateString();
}

function rotateInfo() {
  document.getElementById("info").innerText = ads[adIndex];
  adIndex = (adIndex + 1) % ads.length;
}

setInterval(updateTime, 1000);
setInterval(rotateInfo, 5000);

updateTime();
rotateInfo();
</script>
