<!DOCTYPE html>
<html>
<head>
  <title>BORAX Local Status</title>

  <style>
    body {
      margin: 0;
      background: #001022;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      width: 420px;
      margin: 120px auto;
      border: 2px solid white;
      padding: 20px;
      background: rgba(0,0,0,0.4);
    }

    #time {
      font-size: 60px;
    }

    #date {
      font-size: 18px;
      opacity: 0.8;
    }

    #info {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-line;
      min-height: 80px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h3>BORAX LOCAL STATUS</h3>

    <div id="time">--:--</div>
    <div id="date">---</div>

    <div id="info">Starting broadcast...</div>
  </div>

<script>
let screens = [
  "AD: BORAX Laundry - Trusted since 1982",
  "LOCAL NOTICE: Stay hydrated today",
  "COMMUNITY: Round Rock parks open",
  "WEATHER: 91°F SUNNY\nHumidity: 62%\nWind: 8 mph",
  "FORECAST:\nTomorrow 93°F Sunny\nLow 74°F"
];

let i = 0;

function updateTime() {
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let ampm = h >= 12 ? "PM" : "AM";

  h = h % 12;
  if (h === 0) h = 12;
  if (m < 10) m = "0" + m;

  document.getElementById("time").innerText = `${h}:${m} ${ampm}`;
  document.getElementById("date").innerText = now.toDateString();
}

function rotate() {
  document.getElementById("info").innerText = screens[i];
  i = (i + 1) % screens.length;
}

setInterval(updateTime, 1000);
setInterval(rotate, 5000);

updateTime();
rotate();
</script>

</body>
</html>
